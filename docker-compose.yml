version: "3.9"

services:

  backend:
    build: ./server
    container_name: careerlift_backend

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env

    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build: ./client
    container_name: careerlift_frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    volumes:
      - ./client:/app
      - /app/node_modules